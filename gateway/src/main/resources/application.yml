server:
  port: 8081

spring:
  application:
    name: gateway
  
  cloud:
    gateway:
      server:
        webflux:
          routes:
            # 客户端管理路由（转发到 OAuth2 服务器）
            - id: oauth-clients
              uri: http://localhost:8080
              predicates:
                - Path=/api/clients/**
              # 不使用 StripPrefix，因为 OAuth2 服务器的控制器路径是 /api/clients

            # 登录路由（直接转发到 OAuth2 服务器，不需要认证）
            - id: oauth-login
              uri: http://localhost:8080
              predicates:
                - Path=/api/login
              # 不使用 StripPrefix，因为 OAuth2 服务器的控制器路径是 /api/login

            # 订单服务路由
            - id: order-service
              uri: http://localhost:8082
              predicates:
                - Path=/api/orders/**
              filters:
                - TokenRelay
                - StripPrefix=1

            # 用户服务路由
            - id: user-service
              uri: http://localhost:8083
              predicates:
                - Path=/api/users/**
              filters:
                - TokenRelay
                - StripPrefix=1
          globalcors:
            cors-configurations:
              '[/**]':
                allowedOrigins: "*"
                allowedMethods: "*"
                allowedHeaders: "*"
          default-filters:
            # 保留原始 Host 头
            - PreserveHostHeader

  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 5000ms

  security:
    oauth2:
      client:
        provider:
          oauth-server:
            issuer-uri: http://localhost:8080
            authorization-uri: http://localhost:8080/oauth2/authorize
            token-uri: http://localhost:8080/oauth2/token
            user-info-uri: http://localhost:8080/userinfo
            jwk-set-uri: http://localhost:8080/oauth2/jwks
            user-name-attribute: sub
        registration:
          gateway-client:
            provider: oauth-server
            client-id: gateway-client
            client-secret: gateway-secret
            authorization-grant-type: authorization_code
            redirect-uri: "http://localhost:8081/login/oauth2/code/gateway-client"
            scope:
              - openid
              - profile
              - read
              - write

logging:
  level:
    root: INFO
    org.springframework.cloud.gateway: DEBUG
    org.springframework.security: DEBUG
    org.springframework.security.oauth2: DEBUG
