server:
  port: 8080

spring:
  application:
    name: oauth-server

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3307/oauth2_sso?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root

  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 5000ms

  security:
    oauth2:
      authorization-server:
        issuer: http://localhost:8080

# OAuth2 客户端配置
oauth2:
  clients:
    auto-register: true  # 是否启用自动注册
    # 不在此处硬编码客户端列表，改为启动时检测数据库，如果为空则创建默认客户端

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.example.oauth.server.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

logging:
  level:
    root: INFO
    com.example.oauth.server: DEBUG
    org.springframework.security: INFO
